    "/api/v1/books": {
      "get": {
        "tags": [
          "Books"
        ],
        "summary": "Lấy danh sách sách",
        "description": "Trả về danh sách sách có lọc theo từ khóa, danh mục, tác giả và phân trang",
        "operationId": "getBooks",
        "parameters": [
          {
            "name": "keyword",
            "in": "query",
            "description": "Từ khóa tìm kiếm theo tiêu đề, danh mục hoặc tác giả",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "categoryId",
            "in": "query",
            "description": "ID danh mục dùng để lọc",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "authorIds",
            "in": "query",
            "description": "Danh sách authorId phân tách bằng dấu phẩy",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "page",
            "in": "query",
            "description": "Số trang, bắt đầu từ 0",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "size",
            "in": "query",
            "description": "Số phần tử mỗi trang",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 10
            }
          }
        ],
        "responses": {
          "200": {
