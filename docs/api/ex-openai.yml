openapi: 3.0.3
info:
  title: E-Commerce API
  version: 1.0.0
  description: |
    RESTful API cho hệ thống E-Commerce.
    Hỗ trợ quản lý products, orders và authentication.
  contact:
    name: API Support Team
    email: api-support@ecommerce.com
    url: https://developer.ecommerce.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.ecommerce.com/v1
    description: Production server
  - url: https://staging-api.ecommerce.com/v1
    description: Staging server
  - url: http://localhost:3000/v1
    description: Local development

tags:
  - name: Products
    description: Quản lý sản phẩm
  - name: Orders
    description: Quản lý đơn hàng

paths:
  /products:
    get:
      tags: [Products]
      summary: Lấy danh sách sản phẩm
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          schema:
            type: string
            enum: [electronics, clothing, books, home]
        - name: minPrice
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: maxPrice
          in: query
          schema:
            type: number
            format: double
        - name: sort
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, name_asc, created_desc]
            default: created_desc
      responses:
        '200':
          description: Danh sách sản phẩm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags: [Products]
      summary: Tạo sản phẩm mới
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'

    get:
      tags: [Products]
      summary: Lấy chi tiết sản phẩm
      operationId: getProduct
      responses:
        '200':
          description: OK

    put:
      tags: [Products]
      summary: Cập nhật sản phẩm
      operationId: updateProduct
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated

    delete:
      tags: [Products]
      summary: Xóa sản phẩm
      operationId: deleteProduct
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        category:
          type: string

    ProductListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'

  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad Request

    Unauthorized:
      description: Unauthorized

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT