# =====================
# COMMON CONFIGURATION
# =====================
spring:
  application:
    name: oulib-backend

  datasource:
    url: ${DBMS_CONNECTION:jdbc:mysql://localhost:3307/oulib?useSSL=false&serverTimezone=UTC}
    username: ${DBMS_USERNAME:oulib}
    password: ${DBMS_PASSWORD:oulib123}
    driver-class-name: "com.mysql.cj.jdbc.Driver"

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  flyway:
    enabled: true
    connect-retries: 10
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 1000

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}


auth:
  signer-key: ${SIGNER_KEY}
  valid-duration: 86400
  refreshable-duration: 259200

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

app:
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
  librarian:
    email: ${LIBRARIAN_EMAIL}
    password: ${LIBRARIAN_PASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

---
# ===================================================================
# PROFILE: API
# ===================================================================
spring:
  config:
    activate:
      on-profile: api

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  rabbitmq:
    listener:
      simple:
        auto-startup: false # Tắt Listener
    publisher-returns: false # Đảm bảo tắt cái này để không chờ đợi

server:
  port: 8080

app:
  worker:
    enabled: false # Cờ để Java @ConditionalOnProperty hoạt động

---
# ===================================================================
# PROFILE: WORKER
# ===================================================================
spring:
  main:
    web-application-type: none
  config:
    activate:
      on-profile: worker
  rabbitmq:
    listener:
      simple:
        auto-startup: true # Bật Listener
        acknowledge-mode: auto
        prefetch: 50
        concurrency: 2
        max-concurrency: 4

server:
  port: 0 # Random port

app:
  worker:
    enabled: true # Cờ để Java @ConditionalOnProperty hoạt động
