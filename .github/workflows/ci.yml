name: OUlib CI/CD

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  BACKEND_CONTEXT: ./oulib-backend
  FRONTEND_CONTEXT: ./oulib-frontend

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - run: mvn -B clean test
        working-directory: ${{ env.BACKEND_CONTEXT }}

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: oulib-frontend/package-lock.json

      - run: npm ci
        working-directory: ${{ env.FRONTEND_CONTEXT }}

      - run: npm run build
        working-directory: ${{ env.FRONTEND_CONTEXT }}

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    # CHỈ chạy khi PR đã merge vào main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          IMAGE_TAG=${GITHUB_SHA::7}

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/oulib-backend:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/oulib-backend:$IMAGE_TAG \
                       ${{ env.BACKEND_CONTEXT }}

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oulib-backend:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oulib-backend:latest